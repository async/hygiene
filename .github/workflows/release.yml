name: Release

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the package to npm after verification.
        required: true
        type: boolean
        default: false
      access_only:
        description: Ensure npm package access is public without publishing a new version.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.20.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package
        run: pnpm run release:check

  publish:
    name: Publish npm
    needs: verify
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && (inputs.publish || inputs.access_only))
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@async/hygiene
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Use current npm
        run: npm install -g npm@11.16.0

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.20.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Read package version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "PACKAGE_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Check existing npm package
        run: |
          if npm view "@async/hygiene@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "PACKAGE_ALREADY_PUBLISHED=true" >> "$GITHUB_ENV"
          else
            echo "PACKAGE_ALREADY_PUBLISHED=false" >> "$GITHUB_ENV"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check existing GitHub Packages mirror
        run: |
          github_npmrc="$(mktemp)"
          trap 'rm -f "$github_npmrc"' EXIT
          {
            printf '@async:registry=https://npm.pkg.github.com\n'
            printf '//npm.pkg.github.com/:_authToken=%s\n' "$GITHUB_TOKEN"
          } > "$github_npmrc"

          if NPM_CONFIG_USERCONFIG="$github_npmrc" npm view "@async/hygiene@${PACKAGE_VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "GITHUB_PACKAGE_ALREADY_PUBLISHED=true" >> "$GITHUB_ENV"
          else
            echo "GITHUB_PACKAGE_ALREADY_PUBLISHED=false" >> "$GITHUB_ENV"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Packages mirror
        if: env.GITHUB_PACKAGE_ALREADY_PUBLISHED != 'true' && inputs.access_only != true
        run: |
          github_npmrc="$(mktemp)"
          trap 'rm -f "$github_npmrc"' EXIT
          {
            printf '@async:registry=https://npm.pkg.github.com\n'
            printf '//npm.pkg.github.com/:_authToken=%s\n' "$GITHUB_TOKEN"
          } > "$github_npmrc"

          NPM_CONFIG_USERCONFIG="$github_npmrc" npm publish --ignore-scripts --registry=https://npm.pkg.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish with npm token
        if: env.HAS_NPM_TOKEN == 'true' && env.PACKAGE_ALREADY_PUBLISHED != 'true' && inputs.access_only != true
        run: npm publish --access public --provenance --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish with trusted publishing
        if: env.HAS_NPM_TOKEN != 'true' && env.PACKAGE_ALREADY_PUBLISHED != 'true' && inputs.access_only != true
        run: |
          rm -f .npmrc ~/.npmrc
          npm publish --access public --provenance --registry=https://registry.npmjs.org

      - name: Ensure npm package is public
        if: env.HAS_NPM_TOKEN == 'true'
        run: |
          npm access set status=public @async/hygiene --registry=https://registry.npmjs.org
          npm access get status @async/hygiene --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify public npm registry
        run: |
          npm_config_userconfig="$(mktemp)"
          export NPM_CONFIG_USERCONFIG="$npm_config_userconfig"
          unset NODE_AUTH_TOKEN
          npm view "@async/hygiene@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org
